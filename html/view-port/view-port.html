                  </div>

      </template>
      
      
      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=true,did='view-port'
        ;
        
        var $,debug,vm
        ;
        
        obj.initmod   = function(params){
        
              $           = mod.rd(params,'$',$);
              debug       = mod.rd(params,'debug',debug);
              vm          = mod.rd(params,'vm',vm);
              
        }//initmod
        
        
  //:
  
        obj.host        = host;
        
        var root;
        obj.root        = null;
        var style;
        var body;
        obj.body        = null;
        obj.on          = {};
        var on          = obj.on;
        obj.on.before   = {};
        obj.status      = 'hidden';
        
        var callback    = {};
        
        
  //:
  
  
        obj.init    = function(){
        
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = function(params={}){
        
              host.style.cssText              = 'left:0;top:0;width:750px;height:500px';
              $.drag(host,callback.drag);
              
              var shadow                      = host.shadowRoot;
              
              style                           = $(shadow,'style');
              
              root                            = $(shadow,'#view-port');
              obj.root                        = root;
              
              root.onmouseenter               = e=>icons.style.display='';
              root.onmouseleave               = e=>icons.style.display='none';
              
              var icons                       = $(shadow,'#icons');
              if(params.icons.remove!==false){
                    $(icons,'#close').onclick       = remove;
              }else{
                    $(icons,'#close').remove();
              }
              if(params.icons.minify!==false){
                    $(icons,'#minify').onclick       = hide;
              }else{
                    $(icons,'#minify').remove();
              }
              
              body                            = $(shadow,'#body');
              obj.body                        = body;
              
              
        }//initdom
        
        
  //:
  
  
        callback.drag   = function(e,dragtype,ox,oy){
        
              if(typeof obj.on.drag=='function'){
                    obj.on.drag(e,dragtype,ox,oy);
              }
              
        }//drag
        
        
        obj.css   = function(css){
        
              var index   = style.sheet.insertRule(css);
              
        }//css
        
        
        obj.pos   = function({x,y,w,h}){
        
              var css   = v=>(typeof v=='number' ? v+'px' : v);
              
              if(x!==undefined){
                    host.style.left       = css(x);
              }
              if(y!==undefined){
                    host.style.top        = css(y);
              }
              if(w!==undefined){
                    host.style.width      = css(w);
              }
              if(h!==undefined){
                    host.style.height     = css(h);
              }
              
        }//pos
        
        
        obj.remove   = remove;
        
        function remove(){
        
              root.remove();
              if(vm){
                    vm.remove(obj);
              }
              
        }//remove
        
        
        obj.hide    = hide;
        
        function hide(){
        
              if(typeof on.before.hide=='function'){
                    on.before.hide(obj);
              }
              
              host.style.display    = 'none';
              obj.status            = 'hidden';
              
              if(typeof on.hide=='function'){
                    on.hide(obj);
              }
              
        }//hide
        
        
        obj.show    = show;
        
        function show(){
        
              if(typeof on.before.show=='function'){
                    on.before.show(obj);
              }
              
              host.style.display    = 'block';
              obj.status            = 'visible';
              
              if(typeof on.show=='function'){
                    on.show(obj);
              }
              
        }//show
        
        
  //:
  
  return obj;
  
})

      </script>
      
      
</view-port>
