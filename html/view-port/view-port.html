      </template>
      
      
      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=true,did='view-port'
        ;
        
        var $,debug
        ;
        
        obj.initmod   = function(params){
        
              $           = mod.rd(params,'$',$);
              debug       = mod.rd(params,'debug',debug);
              
        }//initmod
        
        
  //:
  
  
        var body;
        obj.body        = null;
        
        
        var callback    = {};
        
        
  //:
  
  
        obj.init    = function(){
        
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = function(){
        
              var shadow                      = host.shadowRoot;
              
              var root                        = $(shadow,'#view-port');
              $.drag(root,callback.drag);
              root.onmouseenter               = e=>icons.style.display='';
              root.onmouseleave               = e=>icons.style.display='none';
              
              var icons                       = $(shadow,'#icons');
              $(icons,'#close').onclick       = e=>root.remove();
              
              body                            = $(shadow,'#body');
              obj.body                        = body;
              
              
        }//initdom
        
        
  //:
  
  
        callback.drag   = function(e,dragtype,ox,oy){
        }//drag
        
        
        
  //:
  
  return obj;
  
})

      </script>
